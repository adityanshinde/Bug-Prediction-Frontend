<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="8" fill="white" opacity="0.15"/>
      <path d="M24 14L30 20L24 26L18 20L24 14Z" fill="white"/>
      <path d="M24 22L27 25L24 28L21 25L24 22Z" fill="#93C5FD"/>
    </svg>
  </div>

  <nav class="sidebar-nav desktop-nav">
    @for (item of menuItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
        class="nav-item">
        <span class="nav-icon" [innerHTML]="item.icon"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <nav class="sidebar-nav mobile-nav">
    @for (item of mobilePrimaryItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
        class="nav-item">
        <span class="nav-icon" [innerHTML]="item.icon"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }

    <button class="nav-item nav-more-btn" [class.active]="isMoreOpen() || isOverflowActive()" (click)="toggleMoreMenu()">
      <span class="nav-icon"><i class="fas fa-ellipsis-h"></i></span>
      <span class="nav-label">More</span>
    </button>
  </nav>

  @if (isMoreOpen()) {
    <div class="mobile-more-sheet">
      <div class="more-sheet-header">
        <span>More</span>
        <button class="more-close-btn" (click)="closeMoreMenu()" aria-label="Close more menu">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="more-sheet-links">
        @for (item of mobileOverflowItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            (click)="closeMoreMenu()"
            class="more-link">
            <span class="nav-icon" [innerHTML]="item.icon"></span>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>
    </div>
  }
</aside>
